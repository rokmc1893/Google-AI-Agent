name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - '1주차'
  workflow_dispatch:

# gh-pages 브랜치에 dist를 푸시하려면 GITHUB_TOKEN 쓰기 권한이 필요합니다.
permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - name: Build (Vite base = ./, publish to gh-pages root)
        run: npm run build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Push dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: Pages URL (branch 연결 후 접속)
        run: |
          echo "저장소 Pages에서 Branch=gh-pages, /(root) 저장 후 접속:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
